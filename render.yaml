# Render Blueprint — web service only (four Shopify env vars)

services:
  - type: web
    name: bibs-b2b-cart-sync-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run render-build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_customers,write_customers,read_companies,write_companies
      - key: SHOPIFY_APP_URL
        sync: false
